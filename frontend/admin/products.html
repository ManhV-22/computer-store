<!-- products.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Dùng lại CSS Sidebar từ dashboard.html */
        body { display: flex; min-height: 100vh; margin: 0; font-family: Arial; background: #f4f7f6; }
        .sidebar { width: 260px; background: #2c3e50; color: white; position: fixed; height: 100vh; }
        .main-content { flex: 1; margin-left: 260px; padding: 30px; }
        .btn-add { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        </aside>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>💻 Quản lý sản phẩm</h2>
            <button class="btn-add" onclick="showAddProductModal()"><i class="fas fa-plus"></i> Thêm sản phẩm mới</button>
        </div>
        
        <table border="1" width="100%" style="border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #eee;">
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="admin-product-list">
                </tbody>
        </table>
    </div>

    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/product.js"></script> 
</body>
</html>
