<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="admin-main-wrapper">
        <div class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📦 Quản lý sản phẩm</h2>
                <button class="btn-add" onclick="openAddModal()" style="padding: 10px 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer;">
                    + Thêm sản phẩm
                </button>
            </div>

            <table border="1" style="width:100%; border-collapse: collapse; background: white;">
                <tbody id="admin-product-list">
                    <thead>
                        <tr style="background: #2c3e50; color: white;">
                            <th style="padding: 12px;">ID</th>
                            <th style="padding: 12px;">Ảnh</th>
                            <th style="padding: 12px;">Tên sản phẩm</th>
                            <th style="padding: 12px;">Giá</th>
                            <th style="padding: 12px;">Số lượng</th>
                            <th style="padding: 12px;">Trạng thái</th>
                            <th style="padding: 12px;">Thao tác</th>
                        </tr>
                    </thead>

                </tbody>
            </table>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top: 0;">📦 Thêm sản phẩm mới</h3>
            <form id="product-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tên sản phẩm</label>
                        <input type="text" id="p-name" required>
                    </div>
                    <div class="form-group">
                        <label>Giá bán (đ)</label>
                        <input type="number" id="p-price" required>
                    </div>
                    <div class="form-group">
                        <label>Số lượng kho</label>
                        <input type="number" id="p-quantity" required>
                    </div>
                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select id="p-status">
                            <option value="1">Đang bán</option>
                            <option value="0">Tạm ngưng</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Danh mục</label>
                        <select id="p-category" required>
                            <option value="">-- Chọn danh mục --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Thương hiệu</label>
                        <select id="p-brand" required>
                            <option value="">-- Chọn thương hiệu --</option>
                        </select>
                    </div>
                </div> 
                <div class="form-group full-width">
                    <label>Mô tả chi tiết</label>
                    <textarea id="p-description" rows="3"></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Hình ảnh (Chọn nhiều)</label>
                    <input type="file" id="p-images" multiple accept="image/*">
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; grid-column: span 2;">
                    <input type="checkbox" id="p-featured" style="width: auto;">
                    <label for="p-featured" style="margin-bottom: 0;">🌟 Đánh dấu là sản phẩm nổi bật (Hiện trang chủ)</label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button>
                    <button type="button" class="btn-save" onclick="saveProduct()">Lưu sản phẩm</button>
                </div>
            </form>
        </div>
    </div>

    <div id="imageViewerModal" class="modal lightbox">
        <div class="modal-content lightbox-content">
            <span class="close lightbox-close" onclick="closeViewerModal()">&times;</span>
            <h3 style="color: white; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <i class="fas fa-images"></i> Hình ảnh sản phẩm
            </h3>
            <div id="imageViewerContainer" class="viewer-grid"></div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin.js"></script>
    

</body>
</html>
