<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ComputerStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css"> </head>
<body>

    <div id="sidebar-container"></div>

    <div class="admin-main-wrapper">
        
        <header class="top-bar" style="background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div class="user-info" style="font-size: 16px; color: #2c3e50;">
                Chào mừng, <strong id="admin-name">Admin</strong> 
                (<span id="admin-role" style="color: #e74c3c; font-weight: bold;">Role</span>)
            </div>
            <a href="../pages/index.html" class="btn-back" style="text-decoration: none; color: #3498db; font-weight: bold; transition: 0.2s;">
                Xem cửa hàng <i class="fas fa-external-link-alt"></i>
            </a>
        </header>

        <div class="main-content">
            <div class="page-header" style="margin-bottom: 20px;">
                <h2 style="margin: 0;">📊 Bảng điều khiển</h2>
            </div>
            
            <div id="dashboard-overview">
                <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; color: #7f8c8d;">
                    <h3>Dữ liệu tổng quan hệ thống</h3>
                    <p>Các biểu đồ và số liệu sẽ được hiển thị tại đây.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
</body>
</html>
