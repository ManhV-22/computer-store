<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh mục</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* CSS cho Bảng và Modal - Có thể chuyển vào style.css sau */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .btn-save { background: #2ecc71; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #e74c3c; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .table-custom { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
        .table-custom th, .table-custom td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .table-custom th { background-color: #f8f9fa; color: #333; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 8px; width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="admin-main-wrapper">
        <div class="main-content">
            <div class="flex-between">
                <h2 style="margin: 0;">📂 Quản lý Danh mục Sản phẩm</h2>
                <button id="btn-add-category" class="btn-save" onclick="openCategoryModal()">
                    + Thêm danh mục mới
                </button>
            </div>

            <table class="table-custom">
                <thead>
                    <tr>
                        <th style="width: 10%;">ID</th>
                        <th style="width: 40%;">Tên danh mục</th>
                        <th style="width: 25%;">Trạng thái</th>
                        <th style="width: 25%; text-align: right;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="category-list">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #7f8c8d; padding: 30px;">
                            Đang tải dữ liệu...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top: 0; margin-bottom: 20px; color: #2c3e50;">Thêm danh mục mới</h3>
            
            <input type="hidden" id="cat-id"> <div class="form-group">
                <label for="cat-name">Tên danh mục</label>
                <input type="text" id="cat-name" placeholder="VD: Laptop Gaming, Phụ kiện...">
            </div>
            
            <div class="form-group">
                <label for="cat-status">Trạng thái</label>
                <select id="cat-status">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Đang ẩn</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeCategoryModal()">Hủy bỏ</button>
                <button class="btn-save" onclick="saveCategory()">Lưu lại</button>
            </div>
        </div>
    </div>

    <script>
        // JS điều khiển bật/tắt Modal cơ bản
        const modal = document.getElementById('categoryModal');
        
        function openCategoryModal() { 
            document.getElementById('modal-title').innerText = 'Thêm danh mục mới';
            document.getElementById('cat-id').value = '';
            document.getElementById('cat-name').value = '';
            modal.style.display = 'flex'; 
        }
        
        function closeCategoryModal() { 
            modal.style.display = 'none'; 
        }
        
        // Click ra ngoài vùng xám sẽ tự đóng modal
        window.onclick = function(event) { 
            if (event.target == modal) closeCategoryModal(); 
        }
    </script>
    
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
