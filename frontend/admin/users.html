<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Người dùng - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .table-custom { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Đã sửa màu chữ cho dễ nhìn */
        .table-custom th, .table-custom td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; color: #333; }
        .table-custom th { background-color: #f8f9fa; font-weight: 600; color: #000; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .role-admin { background: #e74c3c; color: white; }
        .role-employee { background: #f39c12; color: white; }
        .role-user { background: #3498db; color: white; }
        .status-active { background: #2ecc71; color: white; }
        .status-locked { background: #95a5a6; color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 8px; width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .action-btn { border: none; background: none; cursor: pointer; font-size: 16px; margin-right: 10px; }
        .btn-edit { color: #3498db; }
        .btn-lock { color: #e74c3c; }
        .btn-unlock { color: #2ecc71; }
        .btn-add { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="admin-main-wrapper">
        <div class="main-content">
            <div class="flex-between">
                <h2>👤 Quản lý Người dùng</h2>
                <div class="search-admin" style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Tìm theo tên hoặc email..." id="user-search" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 250px;">
                    <button class="btn-add" onclick="openModal('add')"><i class="fas fa-plus"></i> Thêm mới</button>
                </div>
            </div>

            <table class="table-custom">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Người dùng</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th style="text-align: right;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="admin-user-list">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Cập nhật người dùng</h3>
            <input type="hidden" id="userId">
            
            <div class="form-group">
                <label>Họ tên</label>
                <input type="text" id="userName" placeholder="Nhập họ tên">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="Nhập email">
            </div>
            <div class="form-group" id="passwordGroup">
                <label>Mật khẩu</label>
                <input type="password" id="userPassword" placeholder="Nhập mật khẩu">
            </div>
            <div class="form-group">
                <label>Vai trò</label>
                <select id="userRole">
                    <option value="admin">Quản trị viên (Admin)</option>
                    <option value="employee">Nhân viên (Staff)</option>
                    <option value="user">Khách hàng (Customer)</option>
                </select>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button onclick="closeModal()" style="padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px;">Hủy</button>
                <button onclick="saveUser()" style="padding: 10px 20px; border: none; background: #2ecc71; color: white; border-radius: 5px; cursor: pointer;">Lưu thông tin</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api/users';
        let danhSachNguoiDung = []; // Biến lưu trữ danh sách để tìm kiếm
        let currentMode = 'add'; // 'add' hoặc 'edit'

        // 1. TẢI DANH SÁCH NGƯỜI DÙNG
        async function fetchUsers() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if(result.success) {
                    allUsers = result.data;
                    renderTable(allUsers);
                }
            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                alert("Không thể kết nối đến Backend!");
            }
        }

        // 2. HIỂN THỊ DỮ LIỆU RA BẢNG
        function renderTable(users) {
            const tbody = document.getElementById('admin-user-list');
            tbody.innerHTML = '';
            
            if(users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Không tìm thấy người dùng nào.</td></tr>';
                return;
            }

            users.forEach(user => {
                // Xử lý class badge
                const roleClass = user.role === 'admin' ? 'role-admin' : (user.role === 'employee' ? 'role-employee' : 'role-user');
                const statusClass = user.status === 1 ? 'status-active' : 'status-locked';
                const statusText = user.status === 1 ? 'Hoạt động' : 'Đã khóa';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td><strong>${user.name}</strong><br><small style="color:#7f8c8d">@${user.name.replace(/\s+/g, '').toLowerCase()}</small></td>
                    <td>${user.email}</td>
                    <td><span class="badge ${roleClass}">${user.role.toUpperCase()}</span></td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td style="text-align: right;">
                        <button onclick="openModal('edit', ${user.id})" class="action-btn btn-edit" title="Sửa"><i class="fas fa-edit"></i></button>
                        <button onclick="toggleStatus(${user.id}, ${user.status})" class="action-btn ${user.status === 1 ? 'btn-lock' : 'btn-unlock'}" title="Khóa/Mở khóa">
                            <i class="fas ${user.status === 1 ? 'fa-lock' : 'fa-unlock'}"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 3. TÌM KIẾM NGƯỜI DÙNG
        document.getElementById('user-search').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.name.toLowerCase().includes(keyword) || 
                user.email.toLowerCase().includes(keyword)
            );
            renderTable(filtered);
        });

        // 4. MỞ MODAL (THÊM HOẶC SỬA)
        function openModal(mode, id = null) {
            currentMode = mode;
            const modal = document.getElementById('userModal');
            const title = document.getElementById('modal-title');
            const passGroup = document.getElementById('passwordGroup');
            
            // Xóa dữ liệu cũ
            document.getElementById('userId').value = '';
            document.getElementById('userName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = 'user';

            if (mode === 'add') {
                title.innerText = 'Thêm người dùng mới';
                passGroup.style.display = 'block'; // Hiện ô mật khẩu
                document.getElementById('userEmail').removeAttribute('readonly');
            } else {
                title.innerText = 'Cập nhật thông tin';
                passGroup.style.display = 'none'; // Ẩn ô mật khẩu khi sửa
                
                // Lấy thông tin user hiện tại điền vào form
                const user = allUsers.find(u => u.id === id);
                if(user) {
                    document.getElementById('userId').value = user.id;
                    document.getElementById('userName').value = user.name;
                    document.getElementById('userEmail').value = user.email;
                    document.getElementById('userRole').value = user.role;
                    document.getElementById('userEmail').setAttribute('readonly', true); // Không cho sửa email
                }
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        // 5. LƯU THÔNG TIN (GỌI API POST HOẶC PUT)
        async function saveUser() {
            const id = document.getElementById('userId').value;
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            if(!name || !email) {
                alert("Vui lòng điền đầy đủ tên và email!"); return;
            }

            let url = API_URL;
            let method = 'POST';
            let bodyData = { name, email, password, role };

            if(currentMode === 'edit') {
                url = `${API_URL}/${id}`;
                method = 'PUT';
                bodyData = { name, email, role }; // Sửa thì không gửi pass
            } else if (!password) {
                alert("Vui lòng nhập mật khẩu cho người dùng mới!"); return;
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const result = await response.json();
                
                if(result.success) {
                    alert(result.message);
                    closeModal();
                    fetchUsers(); // Tải lại danh sách
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error(error);
                alert("Lỗi khi lưu dữ liệu!");
            }
        }

        // 6. KHÓA / MỞ KHÓA TÀI KHOẢN
        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 1 ? 0 : 1;
            const actionText = newStatus === 0 ? "Khóa" : "Mở khóa";
            
            if(confirm(`Bạn có chắc muốn ${actionText} người dùng này?`)) {
                try {
                    const response = await fetch(`${API_URL}/${id}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    const result = await response.json();
                    
                    if(result.success) {
                        fetchUsers(); // Tải lại danh sách
                    } else {
                        alert(result.message);
                    }
                } catch (error) {
                    console.error(error);
                    alert("Lỗi khi cập nhật trạng thái!");
                }
            }
        }

        // Chạy ngay khi web load xong
        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
