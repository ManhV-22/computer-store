<!-- reports.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo thống kê - ComputerStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="admin-main-wrapper">
        <div class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <h2 style="margin: 0; color: #2c3e50;">📈 Báo cáo thống kê</h2>
                    <p style="color: #7f8c8d; margin-top: 5px;">Phân tích doanh thu và hiệu suất bán hàng</p>
                </div>
                
                <select id="timeFilter" style="padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd; outline: none;">
                    <option value="today">Hôm nay</option>
                    <option value="week">Tuần này</option>
                    <option value="month">Tháng này</option>
                    <option value="year" selected>Năm nay</option> 
                </select>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                    <i class="fas fa-coins" style="font-size: 30px; color: #f1c40f; margin-bottom: 10px;"></i>
                    <h4 style="margin: 0; color: #7f8c8d;">Tổng doanh thu</h4>
                    <h2 id="totalRevenue" style="margin: 10px 0 0 0; color: #e74c3c;">0đ</h2>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                    <i class="fas fa-shopping-bag" style="font-size: 30px; color: #3498db; margin-bottom: 10px;"></i>
                    <h4 style="margin: 0; color: #7f8c8d;">Đơn hàng hoàn tất</h4>
                    <h2 id="totalOrders" style="margin: 10px 0 0 0; color: #2c3e50;">0</h2>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                    <i class="fas fa-user-plus" style="font-size: 30px; color: #9b59b6; margin-bottom: 10px;"></i>
                    <h4 style="margin: 0; color: #7f8c8d;">Khách hàng mới</h4>
                    <h2 id="totalCustomers" style="margin: 10px 0 0 0; color: #2c3e50;">0</h2>
                </div>
            </div>
            
            <div style="height: 300px; width: 100%;">
                <canvas id="revenueCanvas"></canvas>
            </div>

        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const API_REPORT_URL = 'http://localhost:3000/api/reports/summary';
        let revenueChart; // Biến lưu trữ biểu đồ để tránh lỗi vẽ đè

        // Thêm tham số timeframe vào hàm
        async function loadReports(timeframe = 'year') {
            try {
                // Bắn thêm biến time lên URL để Backend biết đường lọc
                const response = await fetch(`${API_REPORT_URL}?time=${timeframe}`);
                const result = await response.json();

                if (result.success) {
                    // Cập nhật các con số thống kê
                    const formattedRevenue = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(result.totalRevenue);
                    
                    document.getElementById('totalRevenue').innerText = formattedRevenue;
                    document.getElementById('totalOrders').innerText = result.totalOrders;
                    document.getElementById('totalCustomers').innerText = result.totalCustomers;

                    // Vẽ biểu đồ
                    renderChart(result.chartData);
                }
            } catch (error) {
                console.error("Lỗi tải báo cáo:", error);
            }
        }

        function renderChart(chartData) {
            const ctx = document.getElementById('revenueCanvas').getContext('2d');
            
            const labels = chartData.map(item => item.date);
            const data = chartData.map(item => item.revenue);

            if (revenueChart) {
                revenueChart.destroy();
            }

            revenueChart = new Chart(ctx, {
                type: 'line', 
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: data,
                        borderColor: '#2ecc71', 
                        backgroundColor: 'rgba(46, 204, 113, 0.2)', 
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Chạy khi trang web load xong
        document.addEventListener('DOMContentLoaded', () => {
            const timeFilter = document.getElementById('timeFilter');
            
            // 1. Gọi dữ liệu lần đầu tiên theo giá trị mặc định của select (year)
            loadReports(timeFilter.value);

            // 2. Lắng nghe mỗi khi người dùng đổi lựa chọn
            timeFilter.addEventListener('change', (e) => {
                const selectedTime = e.target.value;
                loadReports(selectedTime);
            });
        });
    </script>
</body>
</html>
