<!-- Example: How to add wishlist button to product detail page -->

<!-- Add this script before </body> -->
<script src="../assets/js/wishlist.js"></script>

<!-- Add wishlist button next to add-to-cart button -->
<div class="product-actions">
    <button class="btn btn-primary btn-lg" id="add-to-cart-btn">
        <i class="fas fa-shopping-cart"></i> Thêm vào giỏ hàng
    </button>
    
    <!-- Wishlist Button -->
    <button class="btn btn-outline-danger btn-lg" id="wishlist-btn" 
            data-action="wishlist" 
            data-product-id="PRODUCT_ID_HERE">
        <i class="far fa-heart"></i> <span id="wishlist-btn-text">Thêm vào danh sách yêu thích</span>
    </button>
</div>

<script>
// Khi trang load, check xem sản phẩm có trong wishlist không
document.addEventListener('DOMContentLoaded', async () => {
    const productId = PRODUCT_ID_HERE; // Lấy từ URL hoặc server
    
    // Check nếu sản phẩm trong wishlist
    const inWishlist = await checkProductInWishlist(productId);
    if (inWishlist) {
        const btn = document.getElementById('wishlist-btn');
        btn.classList.add('in-wishlist');
        btn.innerHTML = '<i class="fas fa-heart"></i> Đã thích';
    }
});
</script>

<!-- CSS for styling (add to style.css) -->
<style>
    .product-actions {
        display: flex;
        gap: 15px;
        margin: 20px 0;
    }

    #wishlist-btn {
        transition: all 0.3s ease;
    }

    #wishlist-btn.in-wishlist {
        background-color: #e74c3c;
        color: white;
        border-color: #e74c3c;
    }

    #wishlist-btn.in-wishlist:hover {
        background-color: #c0392b;
        border-color: #c0392b;
    }

    #wishlist-btn:hover {
        transform: scale(1.05);
    }

    @media (max-width: 768px) {
        .product-actions {
            flex-direction: column;
        }

        .product-actions button {
            width: 100%;
        }
    }
</style>
