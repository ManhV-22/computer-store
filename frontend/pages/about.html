<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu - ComputerStore</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="about-hero" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('../assets/img/about-banner.jpg'); background-size: cover; background-position: center; height: 400px; display: flex; align-items: center; justify-content: center; color: #fff; text-align: center;">
            <div class="container">
                <h1 style="font-size: 48px; font-weight: bold; margin-bottom: 15px;">Tầm Nhìn & Sứ Mệnh</h1>
                <p style="font-size: 18px; max-width: 700px; margin: 0 auto; line-height: 1.6;">Mang đến trải nghiệm công nghệ đỉnh cao và dịch vụ tận tâm cho mọi người Việt.</p>
            </div>
        </div>

        <div style="background: #e74c3c; color: #fff; padding: 40px 0;">
            <div class="container" style="display: grid; grid-template-columns: repeat(4, 1fr); text-align: center;">
                <div>
                    <h2 style="font-size: 36px;">10+</h2>
                    <p>Năm kinh nghiệm</p>
                </div>
                <div>
                    <h2 style="font-size: 36px;">50k+</h2>
                    <p>Khách hàng tin dùng</p>
                </div>
                <div>
                    <h2 style="font-size: 36px;">20</h2>
                    <p>Showroom toàn quốc</p>
                </div>
                <div>
                    <h2 style="font-size: 36px;">100%</h2>
                    <p>Sản phẩm chính hãng</p>
                </div>
            </div>
        </div>

        <div class="container py-5" style="text-align: center;">
            <h2 style="margin-bottom: 40px;">Đối Tác Chiến Lược</h2>
            <div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 30px; opacity: 0.8; padding: 20px 0;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/ASUS_Logo.svg" alt="Asus" style="height: 40px; filter: grayscale(100%);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/48/Dell_Logo.svg" alt="Dell" style="height: 40px; filter: grayscale(100%);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/HP_logo_2012.svg" alt="HP" style="height: 40px; filter: grayscale(100%);">
            </div>
        </div>
    </main>
    
    <div id="footer-placeholder"></div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
