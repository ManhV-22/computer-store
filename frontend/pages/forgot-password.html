<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - TechStore</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <main class="container auth-wrapper">
        <div class="auth-card">
            <h2>Quên Mật Khẩu</h2>
            <p style="text-align: center; margin-bottom: 20px; font-size: 0.9rem;">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>
            <form id="forgot-form">
                <div class="form-group">
                    <label>Email đã đăng ký</label>
                    <input type="email" id="forgot-email" required placeholder="Ví dụ: email@domain.com">
                </div>
                <div id="forgot-msg" class="error-msg" style="color: green;"></div>
                <button type="submit" class="btn btn-primary">Gửi liên kết</button>
            </form>
            <div class="auth-links">
                Quay lại <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </main>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
