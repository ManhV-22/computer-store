<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - TechStore</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <main class="container auth-wrapper">
        <div class="auth-card">
            <h2>Đặt Lại Mật Khẩu</h2>
            <form id="reset-form">
                <div class="form-group">
                    <label>Email của bạn</label>
                    <input type="email" id="reset-email" required placeholder="Xác nhận lại email">
                </div>
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" id="reset-new-password" required placeholder="Nhập mật khẩu mới">
                    <small style="color: #6b7280; font-size: 0.8rem; display: block; margin-top: 5px;">* >8 ký tự, gồm chữ hoa, số và ký tự đặc biệt</small>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu mới</label>
                    <input type="password" id="reset-confirm-password" required placeholder="Nhập lại mật khẩu mới">
                </div>
                <div id="reset-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary">Lưu mật khẩu mới</button>
            </form>
        </div>
    </main>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
