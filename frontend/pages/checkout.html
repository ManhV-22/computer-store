    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thanh toán - ComputerStore</title>
        <link rel="stylesheet" href="../assets/css/style.css">
        <style>
            body { background-color: #f4f7f6; color: #333; }
            .breadcrumb { padding: 15px 0; font-size: 0.95rem; color: #7f8c8d; }
            .breadcrumb a { color: #3498db; text-decoration: none; }
            
            .checkout-page { display: grid; grid-template-columns: 6fr 4fr; gap: 30px; margin-bottom: 50px; align-items: start; }
            
            /* Cột trái: Form thông tin */
            .checkout-form-box { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
            .checkout-form-box h3 { margin-top: 0; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px; margin-bottom: 20px; font-size: 1.3rem; }
            
            .form-group { margin-bottom: 15px; }
            .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
            .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none; box-sizing: border-box; }
            .form-group input:focus, .form-group textarea:focus { border-color: #3498db; }
            
            /* Phương thức thanh toán */
            .payment-methods { margin-top: 20px; }
            .payment-option { display: flex; align-items: center; gap: 10px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
            .payment-option:hover { border-color: #3498db; background: #f0f8ff; }
            .payment-option input { cursor: pointer; }

            /* Cột phải: Tóm tắt đơn hàng */
            .checkout-sidebar { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); position: sticky; top: 20px; }
            .checkout-sidebar h3 { margin-top: 0; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px; margin-bottom: 20px; font-size: 1.2rem; }
            
            .order-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
            .order-item img { width: 50px; height: 50px; object-fit: contain; border: 1px solid #ddd; border-radius: 4px; padding: 2px; }
            .order-item-info { flex: 1; margin-left: 10px; }
            .order-item-name { font-size: 0.9rem; font-weight: bold; color: #333; margin-bottom: 3px; }
            .order-item-qty { font-size: 0.8rem; color: #7f8c8d; }
            .order-item-price { font-weight: bold; color: #e74c3c; font-size: 0.95rem; }

            .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; color: #555; }
            .summary-total { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px solid #eee; font-weight: bold; font-size: 1.2rem; color: #e74c3c; }
            
            .btn-place-order { display: block; width: 100%; text-align: center; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; transition: 0.3s; }
            .btn-place-order:hover { background: #219150; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }
        </style>
    </head>
    <body>
        <div id="header-placeholder"></div>

        <div class="container">
            <nav class="breadcrumb">
                <a href="index.html">Trang chủ</a> &nbsp; / &nbsp; <a href="cart.html">Giỏ hàng</a> &nbsp; / &nbsp; <strong>Thanh toán</strong>
            </nav>
        </div>

        <main class="container checkout-page">
            <div class="checkout-form-box">
                <h3>📍 Thông tin giao hàng</h3>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Họ và tên người nhận</label>
                        <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input type="tel" id="phone" placeholder="Nhập số điện thoại" required>
                        </div>
                        <div class="form-group">
                            <label>Email (Để nhận hóa đơn)</label>
                            <input type="email" id="email" placeholder="Nhập email của bạn">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Địa chỉ nhận hàng chi tiết</label>
                        <input type="text" id="address" placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/Thành phố" required>
                    </div>
                    <div class="form-group">
                        <label>Ghi chú cho đơn hàng</label>
                        <textarea id="note" rows="3" placeholder="Ví dụ: Giao giờ hành chính, Gọi trước khi giao..."></textarea>
                    </div>

                    <h3 style="margin-top: 30px;">💳 Phương thức thanh toán</h3>
                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cod" checked>
                            <strong>Thanh toán khi nhận hàng (COD)</strong>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="momo">
                            <strong>Thanh toán qua Ví MoMo</strong>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="banking">
                            <strong>Chuyển khoản ngân hàng (Internet Banking)</strong>
                        </label>
                    </div>
                </form>
            </div>

            <div class="checkout-sidebar">
                <h3>📦 Đơn hàng của bạn</h3>
                <div id="checkout-items-list">
                    </div>

                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
                    <div class="summary-line">
                        <span>Tạm tính</span>
                        <span id="checkout-subtotal">0đ</span>
                    </div>
                    <div class="summary-line">
                        <span>Phí vận chuyển</span>
                        <span style="color: #27ae60;">Miễn phí</span>
                    </div>
                    <div class="summary-total">
                        <span>TỔNG CỘNG</span>
                        <span id="checkout-total">0đ</span>
                    </div>
                    
                    <button type="button" class="btn-place-order" onclick="processCheckout()">XÁC NHẬN ĐẶT HÀNG</button>
                </div>
            </div>
        </main>
        <div id="footer-placeholder"></div>
        <script src="../assets/js/main.js"></script>
        <script src="../assets/js/checkout.js"></script>
    </body>
    </html>
