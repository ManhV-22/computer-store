<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ComputerStore</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
    <div class="auth-form-wrapper">
        <h2 class="auth-title">🛒 ComputerStore</h2>
        <p class="auth-subtitle">Tạo tài khoản mới</p>
        
        <form id="register-form">
            <p id="register-error" class="error-msg"></p>
            
            <div class="form-group">
                <label for="name">Họ và Tên</label>
                <input type="text" id="name" placeholder="VD: Nguyễn Văn A" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Tạo mật khẩu" required>
                    <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                    <span class="toggle-password" onclick="togglePassword('confirm-password')">👁️</span>
                </div>
            </div>
            
            <button type="submit" class="auth-btn">Đăng ký</button>
        </form>
        
        <div class="auth-links">
            <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
            <p><a href="index.html">← Quay lại Trang chủ</a></p>
        </div>
    </div>

    <script>var API_URL = 'http://localhost:3000/api';</script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
